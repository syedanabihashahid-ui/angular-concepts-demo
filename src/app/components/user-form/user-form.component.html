<h2>Reactive Form</h2>

<form [formGroup]="registerForm" (ngSubmit)="submit()">

  <div style="margin-bottom: 15px;">
    <label for="name" style="display: block; margin-bottom: 5px;">Name</label>
    <input id="name" formControlName="name" placeholder="Enter name">
    <div *ngIf="registerForm.get('name')?.invalid && (registerForm.get('name')?.touched || registerForm.get('name')?.dirty)" style="color: red; margin-top: 5px; font-size: 0.8em;">
      <div *ngIf="registerForm.get('name')?.errors?.['required']">
        Name is required.
      </div>
    </div>
  </div>

  <div style="margin-bottom: 15px;">
    <label for="email" style="display: block; margin-bottom: 5px;">Email</label>
    <input id="email" formControlName="email" placeholder="Email">
    <div *ngIf="registerForm.get('email')?.invalid && (registerForm.get('email')?.touched || registerForm.get('email')?.dirty)" style="color: red; margin-top: 5px; font-size: 0.8em;">
      <div *ngIf="registerForm.get('email')?.errors?.['required']">
        Email is required.
      </div>
      <div *ngIf="registerForm.get('email')?.errors?.['email']">
        Please enter a valid email address.
      </div>
    </div>
  </div>

  <div style="margin-bottom: 15px;">
    <label for="password" style="display: block; margin-bottom: 5px;">Password</label>
    <input id="password" type="password" formControlName="password" placeholder="Password">
    <div *ngIf="registerForm.get('password')?.invalid && (registerForm.get('password')?.touched || registerForm.get('password')?.dirty)" style="color: red; margin-top: 5px; font-size: 0.8em;">
      <div *ngIf="registerForm.get('password')?.errors?.['minlength']">
        Password must be at least 6 characters long.
      </div>
    </div>
  </div>

  <button type="submit" [disabled]="registerForm.invalid">Register</button>

</form>
